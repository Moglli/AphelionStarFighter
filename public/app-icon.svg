<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#1c3a5c"/>
      <stop offset="60%" stop-color="#0a1424"/>
      <stop offset="100%" stop-color="#04060e"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffd680" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ff9c40" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#ff9c40" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe"/>
      <stop offset="100%" stop-color="#5cf"/>
    </linearGradient>
    <linearGradient id="exhaust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#eafcff" stop-opacity="0.95"/>
      <stop offset="45%"  stop-color="#8fdcff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5cf"    stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Backdrop -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Star field -->
  <g fill="#fff" fill-opacity="0.6">
    <circle cx="80"  cy="120" r="1.5"/>
    <circle cx="140" cy="80"  r="1"/>
    <circle cx="200" cy="170" r="1.2"/>
    <circle cx="350" cy="100" r="1.8"/>
    <circle cx="420" cy="200" r="1"/>
    <circle cx="450" cy="350" r="1.3"/>
    <circle cx="380" cy="430" r="1.5"/>
    <circle cx="110" cy="380" r="1"/>
    <circle cx="60"  cy="280" r="1.2"/>
    <circle cx="240" cy="40"  r="1"/>
  </g>
  <!-- Distant sun / aphelion glow -->
  <circle cx="380" cy="140" r="100" fill="url(#sun)"/>
  <circle cx="380" cy="140" r="22"  fill="#fff" fill-opacity="0.92"/>
  <!-- Terran fighter — the player's signature dart, ascending toward the
       aphelion sun. The hull polygon is the EXACT in-game Terran fighter
       shape (ship.js HULLS.terran.fighter = [1,0],[-0.7,0.8],[-0.4,0],
       [-0.7,-0.8]) rotated 90° so the nose points up for the icon. -->
  <g transform="translate(256 286) scale(150)">
    <!-- Engine exhaust glow behind the tail -->
    <ellipse cx="0" cy="1.0" rx="0.62" ry="0.30" fill="#5cf" opacity="0.30"/>
    <!-- Twin engines: a nozzle block flush against the hull base, then a
         plume that is brightest + narrow at the nozzle and FLARES WIDER
         while fading to nothing — reads as thrust, not a landing leg. -->
    <g>
      <!-- left engine -->
      <path d="M -0.38 0.60 L -0.48 1.20 L -0.12 1.20 L -0.22 0.60 Z" fill="url(#exhaust)"/>
      <rect x="-0.40" y="0.44" width="0.20" height="0.18" rx="0.05" fill="#8df"/>
      <rect x="-0.36" y="0.47" width="0.12" height="0.12" rx="0.03" fill="#eff" fill-opacity="0.85"/>
      <!-- right engine -->
      <path d="M 0.38 0.60 L 0.48 1.20 L 0.12 1.20 L 0.22 0.60 Z" fill="url(#exhaust)"/>
      <rect x="0.20" y="0.44" width="0.20" height="0.18" rx="0.05" fill="#8df"/>
      <rect x="0.24" y="0.47" width="0.12" height="0.12" rx="0.03" fill="#eff" fill-opacity="0.85"/>
    </g>
    <!-- Hull (nose-up) -->
    <polygon points="0,-1 0.8,0.7 0,0.4 -0.8,0.7"
             fill="url(#hull)" stroke="#dff" stroke-width="0.05" stroke-linejoin="round"/>
    <!-- Wing-root accent lines -->
    <line x1="0" y1="-0.5" x2="0.5" y2="0.55"  stroke="#cff" stroke-width="0.03" opacity="0.45" stroke-linecap="round"/>
    <line x1="0" y1="-0.5" x2="-0.5" y2="0.55" stroke="#cff" stroke-width="0.03" opacity="0.45" stroke-linecap="round"/>
    <!-- Cockpit canopy -->
    <ellipse cx="0" cy="-0.32" rx="0.11" ry="0.21" fill="#fff" fill-opacity="0.9"/>
  </g>
  <!-- Rounded corner mask for iOS-style app-icon shape -->
  <rect width="512" height="512" rx="96" ry="96" fill="none" stroke="#5cf" stroke-width="2" stroke-opacity="0.20"/>
</svg>
